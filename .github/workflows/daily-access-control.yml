name: Daily Host Access Control Check

on:
  # 매일 오전 9시 KST (UTC 00:00)
  schedule:
    - cron: '0 0 * * *'
  # 수동 실행
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Test BASE_URL (default: develop-dev)'
        required: false
        default: 'https://develop-dev.dubuhealth.in'

jobs:
  access-control:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BASE_URL: ${{ github.event.inputs.base_url || 'https://develop-dev.dubuhealth.in' }}
      USER_NAME: ${{ secrets.USER_NAME }}
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
      USER_B_NAME: ${{ secrets.USER_B_NAME }}
      USER_B_PASSWORD: ${{ secrets.USER_B_PASSWORD }}
      HEADLESS: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run TC-21 access control
        run: npx playwright test --project='배포전TC-access-control' --workers=1

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \"🚨 TC-21 호스트 중복 접속 제어 검증 실패\n\nURL: ${BASE_URL}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }" \
            "$SLACK_WEBHOOK_URL"
